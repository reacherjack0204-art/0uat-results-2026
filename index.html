    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        :root { --primary-green: #3B8B4B; --page-bg: #F1F8E9; --white: #FFFFFF; }
        body { font-family: 'Roboto', sans-serif; background-color: var(--page-bg); margin: 0; padding: 0; }
        .bg-primary { background-color: var(--primary-green); }
        .text-primary { color: var(--primary-green); }
        #resultModal { display: flex; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); align-items: center; justify-content: center; }
        .modal-content { background-color: var(--white); padding: 35px; border-radius: 8px; width: 90%; max-width: 450px; text-align: center; border-top: 5px solid var(--primary-green); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .hidden { display: none !important; }
        table td, table th { border: 1px solid #dcedc8; padding: 12px; text-align: center; }
        .marksheet-paper { background-color: var(--white); border: 2px solid var(--primary-green); box-shadow: 0 0 20px rgba(0,0,0,0.05); border-radius: 8px; }
        .btn-print { background-color: var(--primary-green); color: var(--white); font-weight: bold; padding: 1rem 3rem; border-radius: 0.25rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; margin: 0 auto; }

</head>

    <div id="resultModal">
        <div class="modal-content">
            <div class="flex justify-center mb-6">
                <img src="https://upload.wikimedia.org/wikipedia/en/1/1a/Odisha_University_of_Agriculture_and_Technology_logo.png" alt="OUAT Logo" class="h-24 w-auto">
            </div>
            <h2 class="text-2xl font-bold text-primary mb-2">View Semester Result</h2>
            <p class="text-xs text-gray-500 mb-6 uppercase tracking-widest font-semibold border-b border-gray-200 pb-2">Academic Session 2025-26</p>
            <div class="text-left mb-4">
                <label class="block text-primary text-xs font-bold mb-1">Student Full Name</label>
                <input type="text" id="inputName" class="w-full p-3 border border-gray-300 rounded outline-none focus:ring-2 focus:ring-[#3B8B4B]" placeholder="Enter Full Name">
            </div>
            <div class="text-left mb-6">
                <label class="block text-primary text-xs font-bold mb-1">Admission No</label>
                <input type="text" id="inputAdm" class="w-full p-3 border border-gray-300 rounded outline-none focus:ring-2 focus:ring-[#3B8B4B]" placeholder="9 digit ID">
            </div>
            <button onclick="handleLogin()" class="w-full bg-primary text-white font-bold py-4 rounded uppercase tracking-wider text-sm">Access Marksheet</button>
            <p id="errorMsg" class="text-red-600 text-xs mt-3 font-bold hidden italic">Invalid Credentials. Record not found.</p>
        </div>
    </div>

    <div id="marksheetPage" class="hidden min-h-screen p-4 md:p-10">
        <div class="max-w-5xl mx-auto marksheet-paper p-8 md:p-12">
            <div class="flex justify-center mb-6"><img src="https://upload.wikimedia.org/wikipedia/en/1/1a/Odisha_University_of_Agriculture_and_Technology_logo.png" class="h-28 w-auto"></div>
            <div class="text-center mb-10">
                <h1 class="text-2xl md:text-3xl font-black text-primary uppercase">COLLEGE OF AGRICULTURE, OUAT</h1>
                <h2 class="text-lg font-bold text-gray-700 mt-2 border-t border-b border-gray-300 inline-block px-4 py-1">1st Year Semester I, B.Sc. (Hons.) Agriculture (2025-26)</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 text-lg border-b border-gray-200 pb-6">
                <p><strong>Candidate Name:</strong> <span id="resName" class="uppercase font-bold text-primary"></span></p>
                <p><strong>Admission No:</strong> <span id="resAdm" class="font-bold"></span></p>
            </div>
            <table class="w-full mb-10 bg-white">
                <thead><tr class="bg-primary text-white font-bold uppercase"><th>Course Code</th><th>Course Name</th><th>FM</th><th>OM</th><th>Grade</th></tr></thead>
                <tbody id="marksBody"></tbody>
            </table>
            <div class="flex justify-center">
                <table class="w-full md:w-1/2 bg-white">
                    <tr class="bg-primary text-white font-bold"><td>Semester I GPA</td><td id="sem1Gpa"></td></tr>
                    <tr class="bg-[#e8f5e9] font-bold"><td>Current CGPA</td><td id="curCgpa"></td></tr>
                </table>
            </div>
            <div class="mt-12 text-center"><button onclick="window.location.href='https://youtu.be/Aq5WXmQQooo'" class="btn-print">Print Marksheet</button></div>
        </div>
    </div>

        function handleLogin() {
            const rawName = document.getElementById('inputName').value.trim().toLowerCase();
            const admNo = document.getElementById('inputAdm').value.trim();
            const student = students.find(s => s.name.toLowerCase() === rawName && s.adm === admNo);
            if (student) renderMarksheet(student);
            else {
                document.getElementById('errorMsg').classList.remove('hidden');
                setTimeout(() => document.getElementById('errorMsg').classList.add('hidden'), 3000);
            }
        }

        function renderMarksheet(student) {
            document.getElementById('resultModal').classList.add('hidden');
            document.getElementById('marksheetPage').classList.remove('hidden');
            document.getElementById('resName').innerText = student.name;
            document.getElementById('resAdm').innerText = student.adm;
            const body = document.getElementById('marksBody');
            body.innerHTML = ""; let total = 0;
            student.marks.forEach((m, idx) => {
                total += m;
                const grade = m >= 90 ? "O" : m >= 80 ? "A+" : m >= 70 ? "A" : m >= 60 ? "B+" : "B";
                body.innerHTML += `<tr><td class="font-bold text-primary">${courses[idx].code}</td><td>${courses[idx].name}</td><td>100</td><td class="font-bold text-green-800">${m}</td><td class="font-bold">${grade}</td></tr>`;
            });
            const gpa = (total / 6 / 10).toFixed(2);
            document.getElementById('sem1Gpa').innerText = gpa;
            document.getElementById('curCgpa').innerText = gpa;
        }
